<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市活跃度雷达</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #020617;
      overflow-x: hidden;
    }

    .radar-ring {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
      100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }

    .scan-wave {
      animation: scanWave 3s linear infinite;
    }

    @keyframes scanWave {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-md mx-auto min-h-screen relative overflow-hidden">

    <!-- 顶部 -->
    <div class="sticky top-0 z-20 backdrop-blur-xl bg-slate-950/80 border-b border-white/5 px-5 pt-6 pb-4">
      <div class="flex items-center justify-between">

        <div>
          <div class="text-2xl font-bold tracking-tight">
            📡 城市活跃度雷达
          </div>

          <div class="text-slate-400 text-sm mt-1">
            WiFi 城市活跃度采集系统
          </div>
        </div>

        <div class="w-11 h-11 rounded-2xl bg-cyan-500/15 border border-cyan-400/20 flex items-center justify-center text-cyan-400 text-xl">
          📶
        </div>

      </div>
    </div>

    <!-- 内容 -->
    <div class="px-4 pb-32">

      <!-- 雷达扫描 -->
      <div class="mt-5 rounded-3xl overflow-hidden border border-white/5 bg-gradient-to-br from-slate-900 to-slate-950 relative h-[280px] shadow-2xl">

        <!-- 网格背景 -->
        <div class="absolute inset-0 opacity-20"
             style="background-image: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 30px 30px;">
        </div>

        <!-- 扫描扇形 -->
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="relative w-56 h-56">

            <div class="absolute inset-0 rounded-full border border-cyan-400/20"></div>
            <div class="absolute inset-6 rounded-full border border-cyan-400/20"></div>
            <div class="absolute inset-12 rounded-full border border-cyan-400/20"></div>

            <div class="scan-wave absolute inset-0">
              <div class="absolute left-1/2 top-1/2 w-1 h-28 bg-gradient-to-t from-cyan-400 to-transparent origin-bottom"></div>
            </div>

            <div class="radar-ring absolute inset-16 rounded-full bg-cyan-400 shadow-[0_0_60px_rgba(34,211,238,0.9)]"></div>

          </div>
        </div>

        <!-- 信息 -->
        <div class="absolute bottom-5 left-5 right-5 flex items-center justify-between">

          <div>
            <div class="text-xl font-bold">
              团泊西 · 活跃扫描中
            </div>

            <div class="text-slate-400 text-sm mt-1">
              正在分析附近 WiFi 活跃度
            </div>
          </div>

          <div class="px-4 py-2 rounded-2xl bg-cyan-500/15 border border-cyan-400/20 text-cyan-300 text-sm font-semibold">
            实时扫描
          </div>

        </div>
      </div>

      <!-- 数据卡片 -->
      <div class="grid grid-cols-2 gap-4 mt-5">

        <div class="rounded-3xl bg-white/[0.04] border border-white/5 p-5">
          <div class="text-slate-400 text-sm">
            WiFi 总数
          </div>

          <div id="wifiCount" class="text-4xl font-bold mt-2">
            382
          </div>

          <div class="text-cyan-400 text-sm mt-2">
            +18 今日新增
          </div>
        </div>

        <div class="rounded-3xl bg-white/[0.04] border border-white/5 p-5">
          <div class="text-slate-400 text-sm">
            活跃指数
          </div>

          <div id="activeScore" class="text-4xl font-bold mt-2">
            73
          </div>

          <div class="text-emerald-400 text-sm mt-2">
            中高活跃区域
          </div>
        </div>

      </div>

      <!-- 采集状态 -->
      <div class="mt-5 rounded-3xl bg-gradient-to-r from-cyan-500/15 to-blue-500/15 border border-cyan-400/10 p-5">

        <div class="flex items-center justify-between">

          <div>
            <div class="text-lg font-semibold">
              当前采集状态
            </div>

            <div class="text-slate-300 text-sm mt-1">
              GPS 已连接 · 高频扫描模式
            </div>
          </div>

          <div class="w-4 h-4 rounded-full bg-emerald-400 shadow-[0_0_16px_rgba(74,222,128,1)] animate-pulse"></div>

        </div>

        <div class="grid grid-cols-3 gap-3 mt-5">

          <div class="rounded-2xl bg-black/20 p-4 border border-white/5">
            <div class="text-slate-400 text-xs">强信号</div>
            <div class="text-2xl font-bold mt-1">168</div>
          </div>

          <div class="rounded-2xl bg-black/20 p-4 border border-white/5">
            <div class="text-slate-400 text-xs">稳定热点</div>
            <div class="text-2xl font-bold mt-1">112</div>
          </div>

          <div class="rounded-2xl bg-black/20 p-4 border border-white/5">
            <div class="text-slate-400 text-xs">连续天数</div>
            <div class="text-2xl font-bold mt-1">7</div>
          </div>

        </div>
      </div>

      <!-- 热点列表 -->
      <div class="mt-5 rounded-3xl bg-white/[0.04] border border-white/5 overflow-hidden">

        <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
          <div class="text-lg font-semibold">
            📶 附近热点
          </div>

          <div class="text-cyan-400 text-sm">
            实时更新
          </div>
        </div>

        <div id="wifiList"></div>

      </div>

      <!-- AI分析 -->
      <div class="mt-5 rounded-3xl bg-white/[0.04] border border-white/5 p-5">

        <div class="flex items-center justify-between">

          <div>
            <div class="text-lg font-semibold">
              🤖 AI 活跃度判断
            </div>

            <div class="text-slate-400 text-sm mt-1">
              基于 WiFi 密度与时间序列分析
            </div>
          </div>

          <div class="text-3xl font-bold text-emerald-400">
            73
          </div>

        </div>

        <div class="mt-5">

          <div class="flex items-center justify-between text-sm mb-3">
            <span class="text-slate-400">居住活跃度</span>
            <span class="text-white">中高</span>
          </div>

          <div class="w-full h-3 rounded-full bg-slate-800 overflow-hidden">
            <div class="h-full w-[73%] bg-cyan-400 rounded-full"></div>
          </div>

          <div class="text-slate-400 text-sm leading-6 mt-4">
            当前区域 WiFi 密度稳定，强信号热点数量较高，推测实际入住率较高，夜间活跃度明显。
          </div>

        </div>
      </div>

    </div>

    <!-- 底部 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-white/5 bg-slate-950/90 backdrop-blur-2xl px-4 py-4">

      <div class="flex gap-3">

        <button class="flex-1 rounded-2xl bg-white/5 border border-white/10 py-4 font-semibold text-white">
          📍 标记位置
        </button>

        <button onclick="startScan()"
                class="flex-[1.4] rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-500 py-4 font-bold shadow-2xl shadow-cyan-500/20">
          🚀 开始采集
        </button>

      </div>

    </div>

  </div>

  <script>

    const wifiData = [
      { name: 'TP-LINK_3021', signal: '-48 dBm', type: '稳定热点' },
      { name: 'Xiaomi_5G', signal: '-55 dBm', type: '长期活跃' },
      { name: 'HUAWEI_HOME', signal: '-61 dBm', type: 'Mesh 网络' },
      { name: 'ChinaNet_4F3A', signal: '-64 dBm', type: '高频热点' },
    ];

    const wifiList = document.getElementById('wifiList');

    function renderWifiList() {
      wifiList.innerHTML = wifiData.map(item => `
        <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
          <div>
            <div class="font-medium">${item.name}</div>
            <div class="text-slate-400 text-sm mt-1">${item.type}</div>
          </div>

          <div class="text-cyan-400 font-semibold text-sm">
            ${item.signal}
          </div>
        </div>
      `).join('');
    }

    renderWifiList();

    function startScan() {

      const wifiCount = document.getElementById('wifiCount');
      const activeScore = document.getElementById('activeScore');

      let count = parseInt(wifiCount.innerText);
      let score = parseInt(activeScore.innerText);

      const timer = setInterval(() => {

        count += Math.floor(Math.random() * 5 - 1);
        score += Math.floor(Math.random() * 3 - 1);

        wifiCount.innerText = count;
        activeScore.innerText = score;

      }, 1000);

      setTimeout(() => {
        clearInterval(timer);
        alert('扫描完成（HTML 演示版）');
      }, 8000);
    }

  </script>

</body>
</html>
