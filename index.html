<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>WiFi活跃度采集器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #020617;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --cyan: #22d3ee;
    --cyan-dim: rgba(34,211,238,0.15);
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #f1f5f9;
    --text2: #94a3b8;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* 导航 */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(2,6,23,0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .nav-back { width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav h1 { flex: 1; font-size: 18px; font-weight: 700; }
  .nav-right { font-size: 13px; color: var(--text2); }

  .container { padding: 16px; max-width: 520px; margin: 0 auto; padding-bottom: 100px; }

  /* 卡片 */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 18px; margin-bottom: 14px;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

  /* 按钮 */
  .btn {
    display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .btn-cyan { background: linear-gradient(135deg, #0891b2, #06b6d4); color: #fff; }
  .btn-cyan:active { opacity: 0.85; transform: scale(0.98); }
  .btn-dark { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
  .btn-red { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; display: inline-block; }

  /* 指标 */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }
  .metric-value { font-size: 28px; font-weight: 700; color: var(--cyan); }
  .metric-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* 输入 */
  .input-row { margin-bottom: 14px; }
  .input-label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 15px; outline: none;
  }
  input:focus, select:focus { border-color: var(--cyan); }

  /* 列表项 */
  .wifi-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .wifi-signal { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .wifi-signal.strong { background: rgba(52,211,153,0.12); }
  .wifi-signal.medium { background: rgba(251,191,36,0.12); }
  .wifi-signal.weak { background: rgba(248,113,113,0.12); }
  .wifi-info { flex: 1; }
  .wifi-name { font-size: 15px; font-weight: 500; }
  .wifi-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .wifi-rssi { font-size: 14px; font-weight: 600; }
  .wifi-rssi.strong { color: var(--green); }
  .wifi-rssi.medium { color: var(--yellow); }
  .wifi-rssi.weak { color: var(--red); }

  /* 进度条 */
  .progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), #60a5fa); border-radius: 3px; transition: width 0.3s; }

  /* 雷达 */
  .radar-box { position: relative; height: 240px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .radar-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(34,211,238,0.15); }
  .radar-scan { position: absolute; width: 2px; height: 50%; background: linear-gradient(to top, var(--cyan), transparent);
    transform-origin: bottom center; animation: radarSpin 3s linear infinite;
  }
  @keyframes radarSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .radar-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan); animation: radarPulse 2s infinite;
  }
  @keyframes radarPulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

  /* 底部栏 */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(2,6,23,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); padding: 12px 16px 24px;
    display: flex; gap: 10px; max-width: 520px; margin: 0 auto;
  }
  .bottom-bar .btn { margin: 0; flex: 1; }

  /* 状态指示 */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.off { background: var(--red); }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
  .badge-cyan { background: var(--cyan-dim); color: var(--cyan); }

  /* 空状态 */
  .empty { text-align: center; padding: 50px 20px; color: var(--text2); }
  .empty .icon { font-size: 48px; opacity: 0.4; margin-bottom: 12px; }

  .hidden { display: none !important; }

  /* Toast */
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 14px; z-index: 500; opacity: 0; transition: all 0.3s; pointer-events: none; border: 1px solid var(--border);
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ==================== 首页：任务列表 ==================== -->
<div class="page active" id="pageHome">
  <div class="nav">
    <div style="width:36px"></div>
    <h1>📡 WiFi 活跃度采集</h1>
    <div style="width:36px"></div>
  </div>
  <div class="container">
    <div class="card" style="background: linear-gradient(135deg, rgba(8,145,178,0.3), rgba(6,182,212,0.15)); border: 1px solid rgba(34,211,238,0.2);">
      <div style="font-size: 20px; font-weight: 700; margin-bottom: 4px;">WiFi 城市活跃度采集</div>
      <div style="font-size: 13px; color: var(--text2);">手动录入附近WiFi → GPS定位 → 汇总分析入住率</div>
    </div>

    <button class="btn btn-cyan" onclick="createTask()" style="margin-bottom: 16px;">+ 新建采集任务</button>

    <div class="card-title">📋 采集记录</div>
    <div id="taskList"></div>
    <div class="empty" id="emptyTasks">
      <div class="icon">📋</div>
      <div style="font-size: 14px;">还没有采集记录</div>
      <div style="font-size: 12px; color: var(--text2); margin-top: 6px;">点击上方按钮创建任务</div>
    </div>
  </div>
</div>

<!-- ==================== 创建任务 ==================== -->
<div class="page" id="pageCreate">
  <div class="nav">
    <div class="nav-back" onclick="showPage('pageHome')">←</div>
    <h1>新建采集任务</h1>
    <div style="width:36px"></div>
  </div>
  <div class="container">
    <div class="card">
      <div class="input-row">
        <label class="input-label">小区 / 区域名称</label>
        <input type="text" id="taskName" placeholder="如：禹洲御湖郡">
      </div>
      <div class="input-row">
        <label class="input-label">采集点位数（预计）</label>
        <input type="number" id="taskPoints" placeholder="如：10" min="1">
      </div>
    </div>
    <div class="card" style="font-size: 13px; color: var(--text2);">
      💡 提示：到达小区后，在不同位置（楼栋附近、中心广场、门口等）分别采集WiFi数据，点位越多数据越准。
    </div>
    <div class="bottom-bar">
      <button class="btn btn-dark" onclick="showPage('pageHome')">取消</button>
      <button class="btn btn-cyan" onclick="saveTask()">开始采集</button>
    </div>
  </div>
</div>

<!-- ==================== 采集页面 ==================== -->
<div class="page" id="pageCollect">
  <div class="nav">
    <div class="nav-back" onclick="showPage('pageHome')">←</div>
    <h1 id="collectTitle">采集</h1>
    <div class="nav-right" id="collectStatus"></div>
  </div>
  <div class="container">
    <!-- 进度 -->
    <div class="card" style="padding: 14px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <span style="font-size: 13px;">📊 采集进度</span>
        <span style="font-size: 13px; color: var(--text2);" id="collectProgress">0 / 0 点位</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="collectBar" style="width:0%"></div></div>
    </div>

    <!-- GPS状态 -->
    <div class="card" id="gpsCard">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <div>
          <div style="font-size: 14px; font-weight: 500;">📍 GPS 定位</div>
          <div style="font-size: 12px; color: var(--text2); margin-top: 2px;" id="gpsText">点击获取当前位置</div>
        </div>
        <button class="btn btn-sm btn-cyan" onclick="getGPS()">获取位置</button>
      </div>
      <div style="font-size: 12px; color: var(--text2); margin-top: 8px; word-break: break-all;" id="gpsDetail"></div>
    </div>

    <!-- 录入WiFi -->
    <div class="card">
      <div class="card-title">📶 录入附近WiFi</div>
      <div style="font-size: 12px; color: var(--text2); margin-bottom: 12px;">
        打开手机「设置→WLAN」，查看附近WiFi列表，把信息填进来：
      </div>

      <div class="input-row">
        <label class="input-label">WiFi 名称（SSID）</label>
        <input type="text" id="wifiName" placeholder="如：TP-LINK_5G_3021">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-row">
          <label class="input-label">信号强度</label>
          <select id="wifiRssi">
            <option value="">请选择</option>
            <option value="-30">很强 (-30dBm)</option>
            <option value="-40">强 (-40dBm)</option>
            <option value="-50">较强 (-50dBm)</option>
            <option value="-60">中等 (-60dBm)</option>
            <option value="-70">较弱 (-70dBm)</option>
            <option value="-80">弱 (-80dBm)</option>
          </select>
        </div>
        <div class="input-row">
          <label class="input-label">频段</label>
          <select id="wifiBand">
            <option value="">未知</option>
            <option value="2.4G">2.4G</option>
            <option value="5G">5G</option>
          </select>
        </div>
      </div>
      <div class="input-row">
        <label class="input-label">备注（可选）</label>
        <input type="text" id="wifiNote" placeholder="如：1号楼附近、疑似住户">
      </div>

      <button class="btn btn-cyan" onclick="addWifi()" style="margin-top: 4px;">+ 添加这个WiFi</button>
    </div>

    <!-- 当前点位已采WiFi -->
    <div id="currentWifiList"></div>

    <div style="height: 20px;"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-dark" onclick="finishPoint()">✅ 完成本点位</button>
    <button class="btn btn-cyan" onclick="savePoint()">💾 保存点位</button>
  </div>
</div>

<!-- ==================== 分析结果页 ==================== -->
<div class="page" id="pageResult">
  <div class="nav">
    <div class="nav-back" onclick="showPage('pageHome')">←</div>
    <h1 id="resultTitle">分析结果</h1>
    <div style="width:36px"></div>
  </div>
  <div class="container" id="resultContent"></div>
  <div class="bottom-bar">
    <button class="btn btn-dark" onclick="continueCollect()">继续采集</button>
    <button class="btn btn-cyan" onclick="exportData()">导出数据</button>
  </div>
</div>

<script>
// ===================== 数据层 =====================
const DB_KEY = 'wifi_tasks_v1';
let tasks = [];
let currentTaskId = null;
let currentPoint = { wifis: [], gps: null };

function loadTasks() {
  try { const d = localStorage.getItem(DB_KEY); if (d) tasks = JSON.parse(d); }
  catch (e) { tasks = []; }
}
function saveTasks() { localStorage.setItem(DB_KEY, JSON.stringify(tasks)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if (id === 'pageHome') renderTaskList();
}

// ===================== 首页 =====================
function renderTaskList() {
  loadTasks();
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyTasks');

  if (!tasks.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const sorted = [...tasks].sort((a,b) => b.updatedAt - a.updatedAt);
  list.innerHTML = sorted.map(t => {
    const pts = t.points?.length || 0;
    const totalWifi = t.points?.reduce((s,p) => s + (p.wifis?.length || 0), 0) || 0;
    const avgRssi = calcAvgRssi(t.points);
    const dateStr = fmtDate(t.updatedAt);
    return `
      <div class="card" style="cursor: pointer;" onclick="openTask('${t.id}')">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 16px; font-weight: 600;">${esc(t.name)}</div>
            <div style="font-size: 12px; color: var(--text2); margin-top: 4px;">${dateStr} · ${pts}个点位 · ${totalWifi}个WiFi</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 22px; font-weight: 700; color: var(--cyan);">${avgRssi}</div>
            <div style="font-size: 11px; color: var(--text2);">平均信号</div>
          </div>
        </div>
        <div style="margin-top: 10px; display: flex; gap: 6px;">
          ${pts >= (t.totalPoints || 1) ? '<span class="badge badge-cyan">已完成</span>' : ''}
          <span class="badge" style="background: rgba(52,211,153,0.1); color: var(--green);">强信号: ${countStrong(t.points)}</span>
        </div>
      </div>
    `;
  }).join('');
}

function calcAvgRssi(points) {
  if (!points?.length) return '--';
  const vals = [];
  points.forEach(p => p.wifis?.forEach(w => { if (w.rssi) vals.push(parseInt(w.rssi)); }));
  if (!vals.length) return '--';
  const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
  return Math.round(avg) + 'dBm';
}
function countStrong(points) {
  let n = 0;
  points?.forEach(p => p.wifis?.forEach(w => { if (parseInt(w.rssi) >= -50) n++; }));
  return n;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===================== 创建任务 =====================
function createTask() {
  document.getElementById('taskName').value = '';
  document.getElementById('taskPoints').value = '';
  showPage('pageCreate');
}
function saveTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) { toast('请输入区域名称'); return; }
  const task = {
    id: genId(), name: name,
    totalPoints: parseInt(document.getElementById('taskPoints').value) || 0,
    createdAt: Date.now(), updatedAt: Date.now(), points: []
  };
  tasks.push(task); saveTasks();
  openTask(task.id);
}

// ===================== 采集页面 =====================
function openTask(id) {
  currentTaskId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('collectTitle').textContent = t.name;
  currentPoint = { wifis: [], gps: null };
  document.getElementById('wifiName').value = '';
  document.getElementById('wifiRssi').value = '';
  document.getElementById('wifiBand').value = '';
  document.getElementById('wifiNote').value = '';
  document.getElementById('gpsText').textContent = '点击获取当前位置';
  document.getElementById('gpsDetail').textContent = '';
  updateCollectProgress();
  renderCurrentWifis();
  showPage('pageCollect');
}

function updateCollectProgress() {
  const t = tasks.find(x => x.id === currentTaskId);
  const done = t?.points?.length || 0;
  const total = t?.totalPoints || Math.max(done, 1);
  document.getElementById('collectProgress').textContent = `${done} / ${total} 点位`;
  document.getElementById('collectBar').style.width = `${Math.min(100, done/total*100)}%`;
}

function getGPS() {
  if (!navigator.geolocation) { toast('浏览器不支持GPS'); return; }
  toast('正在定位...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentPoint.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
      document.getElementById('gpsText').innerHTML = '<span class="status-dot on"></span>GPS 已获取';
      document.getElementById('gpsDetail').textContent = `纬度: ${pos.coords.latitude.toFixed(6)}  经度: ${pos.coords.longitude.toFixed(6)}  精度: ±${Math.round(pos.coords.accuracy)}米`;
      toast('GPS定位成功');
    },
    err => { toast('定位失败：' + (err.message || '请开启定位权限')); },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function addWifi() {
  const name = document.getElementById('wifiName').value.trim();
  const rssi = document.getElementById('wifiRssi').value;
  if (!name) { toast('请输入WiFi名称'); return; }
  if (!rssi) { toast('请选择信号强度'); return; }

  currentPoint.wifis.push({
    id: genId(), name: name, rssi: rssi,
    band: document.getElementById('wifiBand').value || '未知',
    note: document.getElementById('wifiNote').value.trim()
  });

  document.getElementById('wifiName').value = '';
  document.getElementById('wifiRssi').value = '';
  document.getElementById('wifiBand').value = '';
  document.getElementById('wifiNote').value = '';

  renderCurrentWifis();
  toast(`已添加: ${name}`);
}

function renderCurrentWifis() {
  const container = document.getElementById('currentWifiList');
  if (!currentPoint.wifis.length) { container.innerHTML = ''; return; }

  container.innerHTML = `
    <div class="card-title" style="margin-top: 8px;">📶 当前点位已采 (${currentPoint.wifis.length}个)</div>
    ${currentPoint.wifis.map((w, i) => {
      const rssiVal = parseInt(w.rssi);
      const strength = rssiVal >= -50 ? 'strong' : rssiVal >= -65 ? 'medium' : 'weak';
      const icon = strength === 'strong' ? '📶' : strength === 'medium' ? '📡' : '⚠️';
      const color = strength === 'strong' ? 'strong' : strength === 'medium' ? 'medium' : 'weak';
      return `
        <div class="wifi-item">
          <div class="wifi-signal ${strength}">${icon}</div>
          <div class="wifi-info">
            <div class="wifi-name">${esc(w.name)} ${w.band !== '未知' ? `<span class="badge badge-cyan">${w.band}</span>` : ''}</div>
            <div class="wifi-meta">${w.note || '无备注'}</div>
          </div>
          <div class="wifi-rssi ${color}">${w.rssi}dBm</div>
          <div style="color: var(--red); font-size: 12px; cursor: pointer; padding: 4px;" onclick="removeWifi(${i})">✕</div>
        </div>
      `;
    }).join('')}
  `;
}
function removeWifi(idx) {
  currentPoint.wifis.splice(idx, 1);
  renderCurrentWifis();
}

function savePoint() {
  if (!currentPoint.wifis.length) { toast('请先录入至少一个WiFi'); return; }

  const t = tasks.find(x => x.id === currentTaskId);
  if (!t) return;

  t.points.push({
    id: genId(),
    wifis: [...currentPoint.wifis],
    gps: currentPoint.gps,
    timestamp: Date.now()
  });
  t.updatedAt = Date.now();
  saveTasks();

  toast('点位已保存');
  currentPoint = { wifis: [], gps: null };
  document.getElementById('gpsText').textContent = '点击获取当前位置';
  document.getElementById('gpsDetail').textContent = '';
  updateCollectProgress();
  renderCurrentWifis();
}

function finishPoint() {
  if (currentPoint.wifis.length > 0) {
    if (!confirm('当前点位有未保存的WiFi，是否保存？')) return;
    savePoint();
  }
  showResult();
}

// ===================== 分析结果 =====================
function showResult(taskId) {
  const id = taskId || currentTaskId;
  const t = tasks.find(x => x.id === id);
  if (!t || !t.points.length) { toast('没有采集数据'); return; }

  currentTaskId = id;
  document.getElementById('resultTitle').textContent = t.name + ' 分析';

  const totalPoints = t.points.length;
  const totalWifi = t.points.reduce((s, p) => s + (p.wifis?.length || 0), 0);
  const uniqueNames = new Set();
  t.points.forEach(p => p.wifis?.forEach(w => uniqueNames.add(w.name)));
  const strongCount = countStrong(t.points);
  const allRssi = [];
  t.points.forEach(p => p.wifis?.forEach(w => { if (w.rssi) allRssi.push(parseInt(w.rssi)); }));
  const avgRssi = allRssi.length ? Math.round(allRssi.reduce((a,b)=>a+b,0)/allRssi.length) : 0;

  // 活跃度评分：基于WiFi密度 + 信号强度
  const densityScore = Math.min(100, uniqueNames.size * 5); // 独特WiFi数量
  const signalScore = avgRssi >= -50 ? 90 : avgRssi >= -60 ? 75 : avgRssi >= -70 ? 60 : 40;
  const activityScore = Math.round((densityScore + signalScore) / 2);

  // 找最强信号点位（推测入住率高）
  const pointStats = t.points.map((p, idx) => {
    const rssis = p.wifis?.map(w => parseInt(w.rssi)) || [];
    const avg = rssis.length ? Math.round(rssis.reduce((a,b)=>a+b,0)/rssis.length) : -100;
    return { idx: idx + 1, avgRssi: avg, count: p.wifis?.length || 0, gps: p.gps };
  }).sort((a,b) => b.avgRssi - a.avgRssi);

  document.getElementById('resultContent').innerHTML = `
    <div class="card" style="background: linear-gradient(135deg, rgba(8,145,178,0.25), rgba(6,182,212,0.1)); border: 1px solid rgba(34,211,238,0.2);">
      <div style="text-align: center;">
        <div style="font-size: 14px; color: var(--text2);">区域活跃度评分</div>
        <div style="font-size: 52px; font-weight: 700; color: var(--cyan); margin: 8px 0;">${activityScore}</div>
        <div style="font-size: 14px; color: var(--text2);">${activityScore >= 70 ? '高活跃区域' : activityScore >= 40 ? '中等活跃' : '低活跃区域'}</div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><div class="metric-value">${totalPoints}</div><div class="metric-label">采集点位</div></div>
      <div class="metric"><div class="metric-value">${totalWifi}</div><div class="metric-label">WiFi总数</div></div>
      <div class="metric"><div class="metric-value">${uniqueNames.size}</div><div class="metric-label">独立热点</div></div>
      <div class="metric"><div class="metric-value">${strongCount}</div><div class="metric-label">强信号</div></div>
    </div>

    <div class="card">
      <div class="card-title">📶 信号分布</div>
      <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px;">
          <span>平均信号强度</span><span>${avgRssi}dBm</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, (avgRssi + 100) / 70 * 100))}%"></div></div>
      </div>
      <div style="font-size: 13px; color: var(--text2); line-height: 1.7; margin-top: 10px;">
        ${activityScore >= 70
          ? '该区域WiFi密度高，强信号热点数量多，推测实际入住率较高，夜间活跃度明显。'
          : activityScore >= 40
          ? '该区域WiFi密度中等，存在一定数量住户，但活跃度一般。'
          : '该区域WiFi密度较低，强信号热点少，推测入住率偏低或多为商业/公共WiFi。'}
      </div>
    </div>

    <div class="card-title">🏆 信号最强点位 Top5</div>
    ${pointStats.slice(0,5).map((p, i) => `
      <div class="card" style="padding: 12px 14px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 14px; font-weight: 600;">点位 #${p.idx}</div>
            <div style="font-size: 12px; color: var(--text2); margin-top: 2px;">${p.count}个WiFi ${p.gps ? `· GPS已记录` : ''}</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 20px; font-weight: 700; color: ${p.avgRssi >= -50 ? 'var(--green)' : p.avgRssi >= -65 ? 'var(--yellow)' : 'var(--red)'};">${p.avgRssi}dBm</div>
          </div>
        </div>
      </div>
    `).join('')}
  `;

  showPage('pageResult');
}

function continueCollect() {
  openTask(currentTaskId);
}

// ===================== 导出数据 =====================
function exportData() {
  const t = tasks.find(x => x.id === currentTaskId);
  if (!t) return;

  const data = {
    taskName: t.name,
    exportTime: new Date().toISOString(),
    summary: {
      totalPoints: t.points.length,
      totalWifi: t.points.reduce((s,p) => s + (p.wifis?.length || 0), 0),
      uniqueNetworks: [...new Set(t.points.flatMap(p => p.wifis?.map(w => w.name) || []))]
    },
    points: t.points.map((p, idx) => ({
      pointIndex: idx + 1,
      timestamp: new Date(p.timestamp).toISOString(),
      gps: p.gps,
      wifiCount: p.wifis?.length || 0,
      wifis: p.wifis?.map(w => ({ name: w.name, rssi: w.rssi, band: w.band, note: w.note })) || []
    }))
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${t.name}_WiFi采集数据_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('数据已导出');
}

// 初始化
loadTasks();
renderTaskList();
</script>
</body>
</html>
